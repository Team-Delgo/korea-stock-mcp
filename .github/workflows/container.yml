name: Container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

env:
  IMAGE_NAME: ghcr.io/team-delgo/korea-stock-mcp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate runtime secret
        if: github.event_name != 'pull_request'
        env:
          RUNTIME_ENV: ${{ secrets.PLAYMCP_RUNTIME_ENV }}
        shell: bash
        run: |
          if [ -z "$RUNTIME_ENV" ]; then
            echo "::error::PLAYMCP_RUNTIME_ENV secret is missing or empty."
            exit 1
          fi

          missing=0
          for key in KIS_APP_KEY KIS_APP_SECRET KIS_ENV DART_API_KEY; do
            if ! grep -q "^${key}=" <<< "$RUNTIME_ENV"; then
              echo "::error::PLAYMCP_RUNTIME_ENV is missing ${key}=."
              missing=1
            fi
          done

          exit "$missing"

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNTIME_ENV_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}
          secrets: |
            runtime_env=${{ secrets.PLAYMCP_RUNTIME_ENV }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
